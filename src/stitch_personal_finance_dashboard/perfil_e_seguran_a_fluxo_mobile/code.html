<style>
        body {
            background-color: #060B14;
            color: #dee2f0;
            -webkit-tap-highlight-color: transparent;
        }
        .glow-border {
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.2);
        }
        .glass-card {
            backdrop-filter: blur(8px);
            background: rgba(21, 34, 54, 0.8);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #060B14;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1E3045;
            border-radius: 10px;
        }
        .active-toggle {
            transform: translateX(1.25rem);
            background-color: #00f5d4 !important;
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.6);
        }

<style>
    body {
      min-height: max(884px, 100dvh);

<body class="font-body-md text-body-md-mobile overflow-hidden flex flex-col h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface-elevated border-b border-border-subtle">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container">account_balance_wallet</span>
<h1 class="font-display-lg text-headline-md-mobile text-primary-container lowercase tracking-tighter">fluxo</h1>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary-fixed-dim transition-colors active:scale-95 duration-150">notifications</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto pt-16 pb-24 px-margin-mobile custom-scrollbar bg-surface-base">
<!-- Profile Hero -->
<section class="mt-8 flex flex-col items-center">
<div class="relative group">
<div class="w-24 h-24 rounded-full border-2 border-primary-container glow-border p-1 overflow-hidden transition-transform duration-300 group-hover:scale-105">
<img alt="User Avatar" class="w-full h-full object-cover rounded-full" data-alt="A close-up portrait of a professional man with sharp features, set against a dark, moody studio background with subtle cyan rim lighting. The style is cinematic and high-tech, echoing a deep-dark aesthetic with high contrast and precision. The overall mood is focused and sophisticated, perfectly aligned with a premium financial technology interface." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDO-d1NMj_ZfgLxGBYIPAx9JoEmo3yQI0ybRR6QVXrTsvfwWoLjjiLGBE8lqYr-37av8OtnQaoNzIyanT1hLTFyEzRFqyMEpatHCSDOHqTUuJaG43qe5epbYzhA7lo7Yx3o2zk8pf-YAnBxRy-2IcYxPTKQjQBjbqn1ZyipK1O6mLQJzA_PEkp1lTTyjRZwT-pjGN9x4EtzvP6XZDCmJlFgAziVisHM_eVeUlJcOjTqXqLIE0Q6bxHQ_06TXEZZYfmPKPDj3NamsbY"/>
</div>
<button class="absolute bottom-0 right-0 bg-primary-container text-surface-base rounded-full p-1.5 flex items-center justify-center border border-surface-base active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">edit</span>
</button>
</div>
<h2 class="mt-4 font-headline-md text-headline-md-mobile text-on-surface">Alex Rivera</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant tracking-widest uppercase opacity-70">Premium Tier</p>
</section>
<!-- Profile Sections -->
<div class="mt-10 space-y-6">
<!-- Security Section -->
<section>
<h3 class="font-label-sm text-label-sm text-primary-container uppercase tracking-widest mb-3 px-1">Security</h3>
<div class="bg-surface-card border border-border-subtle rounded-xl overflow-hidden divide-y divide-border-subtle">
<!-- 2FA Toggle -->
<div class="flex items-center justify-between p-4 bg-surface-card active:bg-surface-container transition-colors duration-150">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-elevated flex items-center justify-center text-primary-container">
<span class="material-symbols-outlined">gshield</span>
</div>
<div>
<p class="font-body-md text-on-surface">Two-Factor Auth</p>
<p class="text-[12px] text-on-surface-variant">Secure your account via app</p>
</div>
</div>
<button class="relative w-11 h-6 bg-surface-container-highest rounded-full transition-colors duration-300" onclick="toggleSwitch(this)">
<div class="absolute left-0.5 top-0.5 w-5 h-5 bg-on-surface-variant rounded-full transition-transform duration-300 shadow-sm"></div>
</button>
</div>
<!-- Password Update -->
<button class="w-full flex items-center justify-between p-4 bg-surface-card active:bg-surface-container transition-colors duration-150 text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-elevated flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">lock_reset</span>
</div>
<div>
<p class="font-body-md text-on-surface">Update Password</p>
<p class="text-[12px] text-on-surface-variant">Last changed 4 months ago</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</section>
<!-- Preferences Section -->
<section>
<h3 class="font-label-sm text-label-sm text-primary-container uppercase tracking-widest mb-3 px-1">Preferences</h3>
<div class="bg-surface-card border border-border-subtle rounded-xl overflow-hidden divide-y divide-border-subtle">
<!-- Language Selection -->

<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-elevated flex items-center justify-center text-on-surface-variant">

</div>
<div>

<p class="text-[12px] text-on-surface-variant">English (US)</p>
</div>
</div>

</button>
<!-- Currency Display -->
<button class="w-full flex items-center justify-between p-4 bg-surface-card active:bg-surface-container transition-colors duration-150 text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-elevated flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">payments</span>
</div>
<div>
<p class="font-body-md text-on-surface">Display Currency</p>
<p class="text-[12px] text-on-surface-variant">USD ($)</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</button>
</div>
</section>
<!-- Privacy Section -->
<section>
<h3 class="font-label-sm text-label-sm text-primary-container uppercase tracking-widest mb-3 px-1">Privacy</h3>
<div class="bg-surface-card border border-border-subtle rounded-xl overflow-hidden divide-y divide-border-subtle">
<!-- Data Export -->
<button class="w-full flex items-center justify-between p-4 bg-surface-card active:bg-surface-container transition-colors duration-150 text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-elevated flex items-center justify-center text-neon-lime-income">
<span class="material-symbols-outlined">file_download</span>
</div>
<div>
<p class="font-body-md text-on-surface">Data Export</p>
<p class="text-[12px] text-on-surface-variant">Request your full activity history</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
<!-- Clear Data -->
<button class="w-full flex items-center justify-between p-4 bg-surface-card active:bg-surface-container transition-colors duration-150 text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-elevated flex items-center justify-center text-neon-rose-expense">
<span class="material-symbols-outlined">delete_sweep</span>
</div>
<div>
<p class="font-body-md text-on-surface">Purge History</p>

</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</button>
</div>
</section>
<!-- Danger Zone -->
<section class="pb-8">
<button class="w-full p-4 flex items-center justify-center gap-2 border border-neon-rose-expense rounded-xl text-neon-rose-expense font-label-sm uppercase tracking-widest active:bg-neon-rose-expense active:text-on-surface transition-all duration-200">
<span class="material-symbols-outlined text-[18px]">logout</span>
                    Logout from fluxo
                </button>
</section>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center bg-surface-elevated pb-safe pt-2 h-20 border-t border-border-subtle">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-label-sm text-label-sm">Dashboard</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">swap_horiz</span>
<span class="font-label-sm text-label-sm">Transactions</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-200">
<span class="material-symbols-outlined">track_changes</span>
<span class="font-label-sm text-label-sm">Goals</span>
</button>
<button class="flex flex-col items-center justify-center text-primary-container drop-shadow-[0_0_8px_rgba(0,245,212,0.4)] active:scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</button>
</nav>
<script>
        function toggleSwitch(btn) {
            const circle = btn.querySelector('div');
            const isActive = circle.classList.contains('active-toggle');
            
            if (isActive) {
                circle.classList.remove('active-toggle');
                btn.classList.remove('bg-primary-container/30');
                btn.classList.add('bg-surface-container-highest');
            } else {
                circle.classList.add('active-toggle');
                btn.classList.add('bg-primary-container/30');
                btn.classList.remove('bg-surface-container-highest');
            }
        }

        // Add touch haptics simulation
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
</body></html>
