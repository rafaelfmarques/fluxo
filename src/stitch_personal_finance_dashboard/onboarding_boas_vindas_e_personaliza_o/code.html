<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fiscal Integrity - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .option-card:hover .icon-container {
            transform: scale(1.1);
            transition: transform 0.2s ease-out;
        }
        .option-card.active {
            border-color: #000000;
            background-color: #f2f4f6;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f7f9fb",
                        "secondary-container": "#6cf8bb",
                        "inverse-primary": "#bec6e0",
                        "surface-container-high": "#e6e8ea",
                        "on-secondary-fixed-variant": "#005236",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "on-primary-fixed": "#131b2e",
                        "inverse-surface": "#2d3133",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f7f9fb",
                        "primary-container": "#131b2e",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-background": "#191c1e",
                        "surface-dim": "#d8dadc",
                        "outline": "#76777d",
                        "tertiary": "#000000",
                        "tertiary-fixed-dim": "#b9c7e0",
                        "surface-container-low": "#f2f4f6",
                        "outline-variant": "#c6c6cd",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-fixed-variant": "#3a485c",
                        "on-tertiary": "#ffffff",
                        "primary": "#000000",
                        "surface-container-highest": "#e0e3e5",
                        "on-tertiary-fixed": "#0d1c2f",
                        "secondary-fixed-dim": "#4edea3",
                        "secondary": "#006c49",
                        "error": "#ba1a1a",
                        "surface-tint": "#565e74",
                        "surface-container": "#eceef0",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-primary-container": "#7c839b",
                        "tertiary-fixed": "#d5e3fd",
                        "tertiary-container": "#0d1c2f",
                        "primary-fixed": "#dae2fd",
                        "primary-fixed-dim": "#bec6e0",
                        "surface-variant": "#e0e3e5",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-container": "#00714d",
                        "surface": "#f7f9fb",
                        "on-error-container": "#93000a",
                        "on-tertiary-container": "#76859b",
                        "on-surface-variant": "#45464d",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "container-max": "1200px",
                        "gutter": "24px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "body-sm": ["Inter"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-xl": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full -z-10 opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full blur-[120px] bg-secondary-container"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full blur-[120px] bg-primary-fixed"></div>
</div>
<!-- Onboarding Container -->
<main class="w-full max-w-[640px] animate-fade-in">
<!-- Logo Header -->
<div class="flex justify-center mb-stack-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<span class="font-headline-md text-headline-md text-primary tracking-tight">Fiscal Integrity</span>
</div>
</div>
<!-- Main Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 p-8 md:p-12">
<div class="text-center mb-stack-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">Bem-vindo ao Fiscal Integrity</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Vamos personalizar sua experiência. Qual é o seu principal foco hoje?</p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-stack-lg" id="options-grid">
<button class="option-card flex flex-col items-start p-6 rounded-xl border-2 border-surface-container hover:border-primary/20 transition-all duration-200 text-left bg-surface-container-lowest group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center mb-4 transition-transform text-secondary">
<span class="material-symbols-outlined text-[28px]" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 0;">shield_with_heart</span>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary">Criar Reserva de Emergência</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border-2 border-surface-container hover:border-primary/20 transition-all duration-200 text-left bg-surface-container-lowest group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center mb-4 transition-transform text-secondary">
<span class="material-symbols-outlined text-[28px]" data-icon="auto_graph" style="font-variation-settings: 'FILL' 0;">auto_graph</span>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary">Aposentadoria e Longo Prazo</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border-2 border-surface-container hover:border-primary/20 transition-all duration-200 text-left bg-surface-container-lowest group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center mb-4 transition-transform text-secondary">
<span class="material-symbols-outlined text-[28px]" data-icon="credit_card_off" style="font-variation-settings: 'FILL' 0;">credit_card_off</span>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary">Sair das Dívidas</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border-2 border-surface-container hover:border-primary/20 transition-all duration-200 text-left bg-surface-container-lowest group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-container flex items-center justify-center mb-4 transition-transform text-secondary">
<span class="material-symbols-outlined text-[28px]" data-icon="school" style="font-variation-settings: 'FILL' 0;">school</span>
</div>
<span class="font-label-md text-label-md text-on-surface group-hover:text-primary">Aprender a Investir</span>
</button>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-4">
<button class="w-full py-4 bg-primary text-on-primary font-label-md text-label-md rounded-lg opacity-50 cursor-not-allowed transition-all hover:shadow-lg active:scale-95 disabled:hover:shadow-none disabled:active:scale-100" disabled="" id="next-button">
                    Próximo
                </button>
<div class="flex justify-center items-center gap-1.5">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</div>
</div>
<!-- Footer Info -->
<p class="text-center mt-stack-md font-body-sm text-body-sm text-on-surface-variant">
            Sua privacidade é nossa prioridade. Dados criptografados de ponta a ponta.
        </p>
</main>
<script>
        function selectOption(element) {
            // Remove active class from all options
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('active', 'border-primary');
                card.classList.add('border-surface-container');
                const iconContainer = card.querySelector('.icon-container');
                iconContainer.classList.remove('bg-secondary-container');
                iconContainer.classList.add('bg-surface-container');
                const icon = card.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0";
            });

            // Add active state to clicked element
            element.classList.remove('border-surface-container');
            element.classList.add('active', 'border-primary');
            const iconContainer = element.querySelector('.icon-container');
            iconContainer.classList.remove('bg-surface-container');
            iconContainer.classList.add('bg-secondary-container');
            const icon = element.querySelector('.material-symbols-outlined');
            icon.style.fontVariationSettings = "'FILL' 1";

            // Enable next button
            const nextBtn = document.getElementById('next-button');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            
            // Subtle click vibration effect
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(5);
            }
        }

        // Initialize with fade in
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(20px)';
            main.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
            
            requestAnimationFrame(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
