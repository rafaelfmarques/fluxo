<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>fluxo - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .option-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:hover {
            background-color: rgba(13, 24, 37, 0.8);
            border-color: rgba(0, 245, 212, 0.3);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.05);
        }
        .option-card.active {
            border-color: #00F5D4;
            background-color: rgba(0, 245, 212, 0.05);
            box-shadow: 0 0 25px rgba(0, 245, 212, 0.15);
        }
        .neon-btn-glow {
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.4), inset 0 0 10px rgba(0, 245, 212, 0.2);
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        .font-jetbrains {
            font-family: 'JetBrains Mono', monospace;
        }
        .font-sans-thin {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
        }
        .progress-bar-glow {
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.5);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#060B14",
                        "surface-container": "#0D1825",
                        "surface-container-lowest": "#0D1825",
                        "primary": "#00F5D4",
                        "on-primary": "#060B14",
                        "on-background": "#E0E3E5",
                        "on-surface": "#F7F9FB",
                        "on-surface-variant": "#A0AEC0",
                        "outline-variant": "#1E3045"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "container-max": "1200px",
                        "gutter": "24px",
                        "stack-sm": "8px"
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-sans min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Immersive Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full -z-10 overflow-hidden">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full blur-[150px] bg-primary/10"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] rounded-full blur-[150px] bg-primary/5"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#00F5D4 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<!-- Onboarding Container -->
<main class="w-full max-w-[640px] opacity-0 translate-y-5 transition-all duration-700 ease-out">
<!-- Logo Header -->
<div class="flex justify-center mb-stack-lg">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1, 'wght' 300;">waves</span>
<span class="font-jetbrains text-2xl font-light text-primary tracking-tighter">fluxo</span>
</div>
</div>
<!-- Main Card -->
<div class="bg-surface-container/40 backdrop-blur-md rounded-xl border border-outline-variant p-8 md:p-12 shadow-2xl">
<div class="text-center mb-stack-lg">
<h1 class="font-jetbrains text-3xl font-medium text-on-surface mb-3 tracking-tight">Bem-vindo ao fluxo</h1>
<p class="text-base font-sans-thin text-on-surface-variant max-w-md mx-auto">Vamos personalizar sua experiência. Qual é o seu principal foco hoje?</p>
</div>
<!-- Progress Indicator (Top) -->
<div class="w-full h-[2px] bg-outline-variant mb-10 rounded-full overflow-hidden">
<div class="w-1/3 h-full bg-primary progress-bar-glow transition-all duration-500"></div>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-stack-lg" id="options-grid">
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant text-left bg-surface-container/60 group" onclick="selectOption(this)">
<div class="icon-container w-10 h-10 rounded-lg bg-background/50 flex items-center justify-center mb-4 transition-all text-primary/80 border border-outline-variant group-hover:border-primary/30 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">shield_with_heart</span>
</div>
<span class="font-jetbrains text-xs font-medium text-on-surface/80 group-hover:text-primary transition-colors uppercase tracking-wider">Reserva de Emergência</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant text-left bg-surface-container/60 group" onclick="selectOption(this)">
<div class="icon-container w-10 h-10 rounded-lg bg-background/50 flex items-center justify-center mb-4 transition-all text-primary/80 border border-outline-variant group-hover:border-primary/30 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">auto_graph</span>
</div>
<span class="font-jetbrains text-xs font-medium text-on-surface/80 group-hover:text-primary transition-colors uppercase tracking-wider">Longo Prazo</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant text-left bg-surface-container/60 group" onclick="selectOption(this)">
<div class="icon-container w-10 h-10 rounded-lg bg-background/50 flex items-center justify-center mb-4 transition-all text-primary/80 border border-outline-variant group-hover:border-primary/30 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">credit_card_off</span>
</div>
<span class="font-jetbrains text-xs font-medium text-on-surface/80 group-hover:text-primary transition-colors uppercase tracking-wider">Sair das Dívidas</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant text-left bg-surface-container/60 group" onclick="selectOption(this)">
<div class="icon-container w-10 h-10 rounded-lg bg-background/50 flex items-center justify-center mb-4 transition-all text-primary/80 border border-outline-variant group-hover:border-primary/30 group-hover:text-primary">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 0;">school</span>
</div>
<span class="font-jetbrains text-xs font-medium text-on-surface/80 group-hover:text-primary transition-colors uppercase tracking-wider">Educação Financeira</span>
</button>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-6">
<button class="w-full py-4 bg-primary text-on-primary font-jetbrains font-bold text-sm rounded-lg opacity-40 cursor-not-allowed transition-all duration-300 active:scale-[0.98] disabled:hover:shadow-none" disabled="" id="next-button">
                    PRÓXIMO
                </button>
<div class="flex justify-center items-center gap-4">
<div class="w-8 h-[2px] rounded-full bg-primary progress-bar-glow"></div>
<div class="w-8 h-[2px] rounded-full bg-outline-variant"></div>
<div class="w-8 h-[2px] rounded-full bg-outline-variant"></div>
</div>
</div>
</div>
<!-- Footer Info -->
<p class="text-center mt-stack-md font-jetbrains text-[10px] text-on-surface-variant/60 tracking-widest uppercase">
            Privacidade de ponta a ponta • Fluxo © 2024
        </p>
</main>
<script>
        function selectOption(element) {
            // Reset state
            document.querySelectorAll('.option-card').forEach(card => {
                card.classList.remove('active');
                const icon = card.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 0, 'wght' 300";
            });

            // Active state
            element.classList.add('active');
            const icon = element.querySelector('.material-symbols-outlined');
            icon.style.fontVariationSettings = "'FILL' 1, 'wght' 300";

            // Button activation
            const nextBtn = document.getElementById('next-button');
            nextBtn.disabled = false;
            nextBtn.classList.remove('opacity-40', 'cursor-not-allowed');
            nextBtn.classList.add('neon-btn-glow', 'hover:brightness-110');
            
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(8);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            requestAnimationFrame(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            });
        });
    </script>
</body></html>
