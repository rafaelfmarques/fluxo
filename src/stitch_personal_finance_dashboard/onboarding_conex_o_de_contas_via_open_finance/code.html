                    Conectar Conta

                    Fazer isso mais tarde

<!-- Security Footer -->
<footer class="mt-stack-lg pt-stack-lg border-t border-outline-variant/20 flex flex-wrap justify-center gap-6">

<!-- Atmospheric background element -->
<div class="fixed -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-[100px] -z-10"></div>
</main>
<script>
        // Simple micro-interaction for bank cards
        const buttons = document.querySelectorAll('.bank-card-hover');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                // Remove active state from others
                buttons.forEach(b => b.classList.remove('ring-2', 'ring-secondary', 'bg-secondary-container/10'));
                // Add active state to clicked
                button.classList.add('ring-2', 'ring-secondary', 'bg-secondary-container/10');
            });
        });
    </script>
