<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>fluxo - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .option-card:hover .icon-container {
            transform: scale(1.1);
            transition: transform 0.2s ease-out;
        }
        .option-card.active {
            border-color: #00F5D4;
            background-color: #152236;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.1);
        }
        .neon-glow {
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }
        .font-jetbrains {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#060B14",
                        "surface-container": "#0D1825",
                        "surface-container-lowest": "#152236",
                        "primary": "#00F5D4",
                        "on-primary": "#060B14",
                        "on-background": "#E0E3E5",
                        "on-surface": "#F7F9FB",
                        "on-surface-variant": "#A0AEC0",
                        "outline-variant": "#2D3748"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px",
                        "container-max": "1200px",
                        "gutter": "24px",
                        "stack-sm": "8px"
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-background font-sans min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute top-0 left-0 w-full h-full -z-10 opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full blur-[120px] bg-primary/20"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full blur-[120px] bg-primary/10"></div>
</div>
<!-- Onboarding Container -->
<main class="w-full max-w-[640px] animate-fade-in">
<!-- Logo Header -->
<div class="flex justify-center mb-stack-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">waves</span>
<span class="font-jetbrains text-2xl font-bold text-primary tracking-tighter">fluxo</span>
</div>
</div>
<!-- Main Card -->
<div class="bg-surface-container-lowest/50 backdrop-blur-sm rounded-xl border border-outline-variant/30 p-8 md:p-12">
<div class="text-center mb-stack-lg">
<h1 class="font-jetbrains text-3xl font-bold text-on-surface mb-2">Bem-vindo ao fluxo</h1>
<p class="text-lg text-on-surface-variant">Vamos personalizar sua experiência. Qual é o seu principal foco hoje?</p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-stack-lg" id="options-grid">
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant/50 hover:border-primary/50 transition-all duration-200 text-left bg-surface-container group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-background flex items-center justify-center mb-4 transition-transform text-primary border border-outline-variant/30">
<span class="material-symbols-outlined text-[28px]" data-icon="shield_with_heart" style="font-variation-settings: 'FILL' 0;">shield_with_heart</span>
</div>
<span class="font-jetbrains text-sm font-semibold text-on-surface group-hover:text-primary transition-colors">Criar Reserva de Emergência</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant/50 hover:border-primary/50 transition-all duration-200 text-left bg-surface-container group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-background flex items-center justify-center mb-4 transition-transform text-primary border border-outline-variant/30">
<span class="material-symbols-outlined text-[28px]" data-icon="auto_graph" style="font-variation-settings: 'FILL' 0;">auto_graph</span>
</div>
<span class="font-jetbrains text-sm font-semibold text-on-surface group-hover:text-primary transition-colors">Aposentadoria e Longo Prazo</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant/50 hover:border-primary/50 transition-all duration-200 text-left bg-surface-container group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-background flex items-center justify-center mb-4 transition-transform text-primary border border-outline-variant/30">
<span class="material-symbols-outlined text-[28px]" data-icon="credit_card_off" style="font-variation-settings: 'FILL' 0;">credit_card_off</span>
</div>
<span class="font-jetbrains text-sm font-semibold text-on-surface group-hover:text-primary transition-colors">Sair das Dívidas</span>
</button>
<button class="option-card flex flex-col items-start p-6 rounded-xl border border-outline-variant/50 hover:border-primary/50 transition-all duration-200 text-left bg-surface-container group" onclick="selectOption(this)">
<div class="icon-container w-12 h-12 rounded-lg bg-background flex items-center justify-center mb-4 transition-transform text-primary border border-outline-variant/30">
<span class="material-symbols-outlined text-[28px]" data-icon="school" style="font-variation-settings: 'FILL' 0;">school</span>
</div>
<span class="font-jetbrains text-sm font-semibold text-on-surface group-hover:text-primary transition-colors">Aprender a Investir</span>
</button>
</div>
<!-- Action Button -->
<div class="flex flex-col gap-4">
<button class="w-full py-4 bg-primary text-on-primary font-jetbrains font-bold text-sm rounded-lg opacity-50 cursor-not-allowed transition-all hover:neon-glow active:scale-95 disabled:hover:shadow-none disabled:active:scale-100" disabled="" id="next-button">
                Próximo
            </button>
<div class="flex justify-center items-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary neon-glow"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
</div>
</div>
</div>
<!-- Footer Info -->
<p class="text-center mt-stack-md font-jetbrains text-xs text-on-surface-variant">
        Sua privacidade é nossa prioridade. Dados criptografados de ponta a ponta.
    </p>
</main>
<script>
    function selectOption(element) {
        // Remove active class from all options
        document.querySelectorAll('.option-card').forEach(card => {
            card.classList.remove('active');
            card.classList.remove('border-primary');
            card.classList.add('border-outline-variant/50');
            const iconContainer = card.querySelector('.icon-container');
            iconContainer.classList.remove('border-primary/50');
            iconContainer.classList.add('border-outline-variant/30');
            const icon = card.querySelector('.material-symbols-outlined');
            icon.style.fontVariationSettings = "'FILL' 0";
        });

        // Add active state to clicked element
        element.classList.remove('border-outline-variant/50');
        element.classList.add('active', 'border-primary');
        const iconContainer = element.querySelector('.icon-container');
        iconContainer.classList.remove('border-outline-variant/30');
        iconContainer.classList.add('border-primary/50');
        const icon = element.querySelector('.material-symbols-outlined');
        icon.style.fontVariationSettings = "'FILL' 1";

        // Enable next button
        const nextBtn = document.getElementById('next-button');
        nextBtn.disabled = false;
        nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        
        // Subtle click vibration effect
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(5);
        }
    }

    // Initialize with fade in
    document.addEventListener('DOMContentLoaded', () => {
        const main = document.querySelector('main');
        main.style.opacity = '0';
        main.style.transform = 'translateY(20px)';
        main.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
        
        requestAnimationFrame(() => {
            main.style.opacity = '1';
            main.style.transform = 'translateY(0)';
        });
    });
</script>
</body></html>
